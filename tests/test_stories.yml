stories:
- story: Path 1
  steps:
  - user: |
      Привет
    intent: greet
  - action: utter_greet
  - user: |
      Расскажите об архитектуре ПО
    intent: ask_architecture
  - action: utter_architecture_response

- story: Path 2
  steps:
  - user: |
      Добрый день
    intent: greet
  - action: utter_greet
  - user: |
      Что такое микросервисная архитектура?
    intent: ask_architecture
  - action: utter_architecture_response
  - user: |
      До свидания!
    intent: goodbye
  - action: utter_goodbye

- story: Another path
  steps:
  - user: |
      Здорова
    intent: greet
  - action: utter_greet
  - user: |
      Как проектировать программное обеспечение?
    intent: ask_architecture
  - action: utter_architecture_response
  - user: |
      Подробнее расскажи об этом
    intent: request_info
  - action: utter_ask_more

- story: say goodbye
  steps:
  - user: |
      Пока
    intent: goodbye
  - action: utter_goodbye