version: "3.1"

nlu:
- intent: greet
  examples: |
    - Привет
    - Добрый день
    - Здорова
    - Нихау
    - Хай
    - Ку

- intent: goodbye
  examples: |
    - Пока
    - До свидвания
    - Счастливо
    - Покеда
    - Чао
    - Досвидос
    - Адьос

- intent: ask_architecture
  examples: |
    - Расскажите об архитектуре ПО
    - Какие подходы существуют в архитектуре?
    - Что такое микросервисная архитектура?
    - Как выбрать архитектуру ПО?
    - Что ты знаешь об архитектуре?
    - Как проектировать программное обеспечение?
    - Как создать программу?

- intent: request_info
  examples: |
    - Расскажите больше об этом
    - Можете уточнить?
    - Какие есть детали?
    - Что еще?
    - Есть подробности?
    - Какие еще сведения есть?
    - Подробнее расскажи об этом